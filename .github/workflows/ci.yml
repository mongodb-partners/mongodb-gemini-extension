name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify extension starts
        run: |
          # Create a minimal config for smoke test
          echo '{"MONGODB_URI": "mongodb://localhost:27017/test"}' > mongo.config.json
          # Start and give it 2 seconds — it should not crash on startup
          timeout 2 node run.js || EXIT_CODE=$?
          # Exit code 124 = timeout (meaning it stayed alive), which is success
          if [ "${EXIT_CODE:-0}" -eq 124 ] || [ "${EXIT_CODE:-0}" -eq 0 ]; then
            echo "Extension started successfully"
          else
            echo "Extension failed to start with exit code ${EXIT_CODE}"
            exit 1
          fi
